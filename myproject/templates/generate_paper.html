{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickCraft</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'main.css' %}">
</head>
<body>

    <header class="top-bar">
        <div class="logo">
            <span class="logo-text">QuickCraft</span>
            <span class="tagline">AI-powered question paper generator</span>
        </div>
        <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme">
            <span class="icon" id="theme-icon">&#9790;</span>
            <span id="theme-label">Dark mode</span>
        </button>
    </header>

    <div class="page-body">
        <form method="POST" action="{% url 'generate_paper' %}" enctype="multipart/form-data" class="paper-form" id="paper-form">
            {% csrf_token %}

            <div class="form-section">
                <h2 class="section-title">Paper Details</h2>
                <div class="field-row">
                    <div class="field">
                        <label for="subject">Subject</label>
                        <input type="text" id="subject" name="subject" placeholder="e.g. Data Structures" required>
                    </div>
                    <div class="field">
                        <label for="subject_marks">Total Marks</label>
                        <input type="number" id="subject_marks" name="subject_marks" placeholder="e.g. 25" min="1" required>
                    </div>
                </div>
                <div class="field-row">
                    <div class="field">
                        <label for="question_count">No. of Questions</label>
                        <input type="number" id="question_count" name="question_count" placeholder="e.g. 5" min="1" required>
                    </div>
                    <div class="field">
                        <label for="duration">Duration (hrs)</label>
                        <input type="number" id="duration" name="duration" placeholder="e.g. 1" min="1" required>
                    </div>
                </div>
                <div class="field">
                    <label for="difficulty">Difficulty / Type</label>
                    <input type="text" id="difficulty" name="difficulty" placeholder="e.g. Easy / Hard / 2nd year Engineering 5th sem" required>
                </div>
            </div>

            <div class="form-section">
                <h2 class="section-title">PDF Content <span class="optional">optional</span></h2>
                <div class="field">
                    <label for="pdf_file">Upload PDF</label>
                    <div class="file-input-wrapper">
                        <input type="file" id="pdf_file" name="pdf_file" accept=".pdf">
                        <span class="file-hint" id="file-hint">Click to browse or drag & drop</span>
                    </div>
                </div>
                <div class="field">
                    <label for="pdf_usage">How to use the PDF</label>
                    <select id="pdf_usage" name="pdf_usage">
                        <option value="" disabled selected>Select usage</option>
                        <option value="also">Blend: mix PDF content with general knowledge</option>
                        <option value="only">Strict: questions from PDF only</option>
                    </select>
                </div>
            </div>

            <button type="submit" class="submit-btn" id="submit-btn">
                <span class="btn-text">Generate Paper</span>
                <span class="btn-spinner" hidden>
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg>
                    Generating…
                </span>
            </button>
        </form>
    </div>

    <script>
        // ── Theme toggle ──────────────────────────
        const toggleBtn  = document.getElementById('theme-toggle');
        const themeIcon  = document.getElementById('theme-icon');
        const themeLabel = document.getElementById('theme-label');

        function applyTheme(dark) {
            document.body.dataset.theme = dark ? 'dark' : 'light';
            themeIcon.textContent  = dark ? '☀' : '☾';
            themeLabel.textContent = dark ? 'Light mode' : 'Dark mode';
            localStorage.setItem('qc-theme', dark ? 'dark' : 'light');
        }

        // Default: light mode
        const saved = localStorage.getItem('qc-theme');
        applyTheme(saved === 'dark');

        toggleBtn.addEventListener('click', () => {
            applyTheme(document.body.dataset.theme !== 'dark');
        });

        // ── Submit spinner ────────────────────────
        document.getElementById('paper-form').addEventListener('submit', () => {
            document.querySelector('.btn-text').hidden = true;
            document.querySelector('.btn-spinner').hidden = false;
            document.getElementById('submit-btn').disabled = true;
        });

        // ── File name display + conditional required ──
        const pdfUsage = document.getElementById('pdf_usage');
        document.getElementById('pdf_file').addEventListener('change', (e) => {
            const file = e.target.files[0];
            document.getElementById('file-hint').textContent =
                file?.name || 'Click to browse or drag & drop';
            pdfUsage.required = !!file;
        });
    </script>
</body>
</html>
